<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cogito Teacher</title>
<style>
  :root{ --bg:#0a0c10; --soft:#11151c; --line:#1f2630; --fg:#e7edf5; --muted:#94a3b8;
         --accent:#7dd3fc; --you:#0b3a52; --teach:#141a22; --maxw:760px; }
  *{box-sizing:border-box} html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--fg);
       font:16px/1.6 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  .wrap{max-width:var(--maxw);margin:0 auto;height:100%;display:flex;flex-direction:column;padding:0 16px}
  header{padding:20px 4px 12px;border-bottom:1px solid var(--line)}
  header h1{margin:0;font-size:18px;letter-spacing:-.01em}
  header p{margin:4px 0 0;color:var(--muted);font-size:13px}
  #log{flex:1;overflow-y:auto;padding:18px 2px;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:88%;padding:11px 14px;border-radius:13px;white-space:pre-wrap;border:1px solid var(--line)}
  .you{align-self:flex-end;background:var(--you);border-color:#1d5b7a}
  .teach{align-self:flex-start;background:var(--teach)}
  .who{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .dim{color:var(--muted);font-style:italic}
  form{display:flex;gap:8px;padding:12px 2px 20px;border-top:1px solid var(--line)}
  #in{flex:1;background:var(--soft);border:1px solid var(--line);color:var(--fg);
      border-radius:10px;padding:11px 13px;font:inherit;resize:none}
  button{background:linear-gradient(180deg,#0b3a52,#082635);border:1px solid #1d5b7a;color:var(--fg);
         padding:0 18px;border-radius:10px;font-weight:600;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Cogito Teacher</h1>
      <p>Plain-text tutor. Opens with your due review, then teaches one step at a time.</p>
    </header>
    <div id="log"></div>
    <form id="f">
      <textarea id="in" rows="1" placeholder="Type your answer…" autocomplete="off"></textarea>
      <button id="send" type="submit">Send</button>
    </form>
  </div>
<script>
const log = document.getElementById('log'), input = document.getElementById('in'),
      form = document.getElementById('f'), send = document.getElementById('send');
let messages = [];

function bubble(role, text){
  const d = document.createElement('div');
  d.className = 'msg ' + (role === 'user' ? 'you' : 'teach');
  d.innerHTML = '<div class="who">' + (role === 'user' ? 'You' : 'Teacher') + '</div>';
  const b = document.createElement('div'); b.textContent = text; d.appendChild(b);
  log.appendChild(d); log.scrollTop = log.scrollHeight; return b;
}
async function turn(){
  send.disabled = true;
  const thinking = bubble('teacher', '…'); thinking.parentElement.classList.add('dim');
  try{
    const r = await fetch('/api/chat', {method:'POST', headers:{'Content-Type':'application/json'},
                                        body: JSON.stringify({messages})});
    const data = await r.json();
    thinking.parentElement.classList.remove('dim');
    const reply = data.reply || ('[' + (data.error || 'no reply') + ']');
    thinking.textContent = reply;
    messages.push({role:'assistant', content: reply});
  }catch(e){ thinking.textContent = '[network error: ' + e.message + ']'; }
  send.disabled = false; input.focus();
}
form.addEventListener('submit', e => {
  e.preventDefault();
  const t = input.value.trim(); if(!t) return;
  bubble('user', t); messages.push({role:'user', content:t}); input.value='';
  turn();
});
// Open the session: ask the server for the retrieval opener (empty history).
turn();
</script>
</body>
</html>
